version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: score-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///./score.db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:8501
      - ENVIRONMENT=production
      - DEBUG=False
    volumes:
      - ./backend:/app
      - ./backend/chromadb_data:/app/chromadb_data
    restart: unless-stopped
    networks:
      - score-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: score-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ENVIRONMENT=production
      - VITE_DEBUG=false
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - score-network

  # Redis Cache (Optional)
  redis:
    image: redis:7.2-alpine
    container_name: score-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - score-network

networks:
  score-network:
    driver: bridge